<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cartinha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#fff3e4;
  --paper-2:#f7e6d0;
  --ink:#68162a;
  --ink-soft:#84334a;
  --muted:#9a5868;
  --accent:#8a1538;
  --accent-2:#b55d73;
  --line:rgba(138,21,56,.26);
  --decor:rgba(138,21,56,.22);
  --bg:#16060b;
  --shadow:rgba(40,5,16,.34);
  --glow-1:rgba(138,21,56,.18);
  --glow-2:rgba(181,93,115,.16);
  --line-soft:rgba(138,21,56,.13);
  --paper-ui:#fff7ed;
  --paper-ui-2:#fff8ef;
  --placeholder:rgba(154,88,104,.62);
  --accent-shadow:rgba(138,21,56,.25);
  --accent-shadow-soft:rgba(138,21,56,.22);
  --stamp-border:rgba(138,21,56,.18);
  --font-card:'Cormorant Garamond', Georgia, serif;
  --font-ui:'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html{
  min-height:100%;
  background:var(--bg);
}

body{
  min-height:100vh;
  min-height:100svh;
  background:
    radial-gradient(circle at 20% 20%, var(--glow-1), transparent 32%),
    radial-gradient(circle at 80% 80%, var(--glow-2), transparent 36%),
    var(--bg);
  display:grid;
  place-items:center;
  font-family:var(--font-ui);
  overflow-x:hidden;
  overflow-y:auto;
  padding:clamp(12px,4vw,28px);
  -webkit-text-size-adjust:100%;
}

button,input,textarea,select{font:inherit;}
button,select{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}

body[data-theme="bordo"]{
  --paper:#fff1df;
  --paper-2:#f4dcc5;
  --ink:#68162a;
  --ink-soft:#84334a;
  --muted:#965267;
  --accent:#8a1538;
  --accent-2:#bd6a7d;
  --line:rgba(138,21,56,.28);
  --decor:rgba(138,21,56,.24);
  --bg:#16060b;
  --shadow:rgba(48,5,17,.38);
  --glow-1:rgba(138,21,56,.18);
  --glow-2:rgba(189,106,125,.16);
  --line-soft:rgba(138,21,56,.14);
  --paper-ui:#fff7ed;
  --paper-ui-2:#fff8ef;
  --placeholder:rgba(150,82,103,.62);
  --accent-shadow:rgba(138,21,56,.25);
  --accent-shadow-soft:rgba(138,21,56,.22);
  --stamp-border:rgba(138,21,56,.18);
}

body[data-theme="gatinha"]{
  --paper:#fff6fb;
  --paper-2:#ffe0ef;
  --ink:#711142;
  --ink-soft:#9b315f;
  --muted:#a95279;
  --accent:#e66fa8;
  --accent-2:#f3a6c8;
  --line:rgba(230,111,168,.35);
  --decor:rgba(230,111,168,.28);
  --bg:#3a0f25;
  --shadow:rgba(80,12,45,.28);
  --glow-1:rgba(230,111,168,.18);
  --glow-2:rgba(243,166,200,.16);
  --line-soft:rgba(230,111,168,.16);
  --paper-ui:#fff8fc;
  --paper-ui-2:#fff9fd;
  --placeholder:rgba(169,82,121,.62);
  --accent-shadow:rgba(230,111,168,.25);
  --accent-shadow-soft:rgba(230,111,168,.22);
  --stamp-border:rgba(230,111,168,.20);
}

body[data-theme="halloween"]{
  --paper:#fff0dc;
  --paper-2:#ffe0b8;
  --ink:#3a194c;
  --ink-soft:#61316d;
  --muted:#7d526f;
  --accent:#d95f1a;
  --accent-2:#7a3da1;
  --line:rgba(217,95,26,.32);
  --decor:rgba(58,25,76,.24);
  --bg:#120817;
  --shadow:rgba(20,5,28,.45);
  --glow-1:rgba(217,95,26,.18);
  --glow-2:rgba(122,61,161,.16);
  --line-soft:rgba(217,95,26,.15);
  --paper-ui:#fff7ec;
  --paper-ui-2:#fff8ef;
  --placeholder:rgba(125,82,111,.62);
  --accent-shadow:rgba(217,95,26,.25);
  --accent-shadow-soft:rgba(217,95,26,.22);
  --stamp-border:rgba(217,95,26,.20);
}

body[data-theme="flores"]{
  --paper:#fff8f0;
  --paper-2:#f4ead9;
  --ink:#4c3a1f;
  --ink-soft:#7b5a35;
  --muted:#80684c;
  --accent:#b94c62;
  --accent-2:#64855b;
  --line:rgba(185,76,98,.26);
  --decor:rgba(100,133,91,.22);
  --bg:#1b2515;
  --shadow:rgba(25,45,18,.34);
  --glow-1:rgba(185,76,98,.18);
  --glow-2:rgba(100,133,91,.16);
  --line-soft:rgba(185,76,98,.13);
  --paper-ui:#fffaf4;
  --paper-ui-2:#fffaf4;
  --placeholder:rgba(128,104,76,.62);
  --accent-shadow:rgba(185,76,98,.25);
  --accent-shadow-soft:rgba(185,76,98,.22);
  --stamp-border:rgba(185,76,98,.18);
}

body[data-theme="azulejo"]{
  --paper:#fffdf4;
  --paper-2:#e8f2fb;
  --ink:#143e68;
  --ink-soft:#285a87;
  --muted:#51769c;
  --accent:#1d67a2;
  --accent-2:#7ab2da;
  --line:rgba(29,103,162,.32);
  --decor:rgba(29,103,162,.25);
  --bg:#081a2c;
  --shadow:rgba(4,20,38,.42);
  --glow-1:rgba(29,103,162,.18);
  --glow-2:rgba(122,178,218,.16);
  --line-soft:rgba(29,103,162,.15);
  --paper-ui:#ffffff;
  --paper-ui-2:#ffffff;
  --placeholder:rgba(81,118,156,.62);
  --accent-shadow:rgba(29,103,162,.25);
  --accent-shadow-soft:rgba(29,103,162,.22);
  --stamp-border:rgba(29,103,162,.20);
}

/* ── CARD ─────────────────────────────── */
.card{
  width:min(420px,100%);
  max-width:420px;
  background-color:var(--paper);
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:6px;
  position:relative;
  padding:0;
  overflow:hidden;
  box-shadow:
    0 3px 8px rgba(0,0,0,.24),
    0 14px 34px var(--shadow),
    0 34px 90px rgba(0,0,0,.26),
    inset 0 0 0 1px rgba(255,255,255,.18);
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.38), transparent 40%),
    repeating-linear-gradient(
      transparent,
      transparent 29px,
      var(--line-soft) 30px
    );
  z-index:1;
}

.theme-picker{
  position:absolute;
  top:12px;
  right:12px;
  z-index:10;
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--paper-ui);
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 8px 6px 10px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.theme-picker label{
  font:600 9px/1 var(--font-ui);
  color:var(--muted);
  letter-spacing:1.6px;
  text-transform:uppercase;
}
.theme-picker select{
  max-width:122px;
  border:0;
  background:transparent;
  color:var(--ink);
  outline:none;
  font-size:11px;
  font-weight:600;
}

.theme-decor{
  position:absolute;
  left:0;
  right:0;
  height:30px;
  pointer-events:none;
  z-index:2;
  color:var(--decor);
  font-family:var(--font-card);
  font-size:18px;
  letter-spacing:10px;
  text-align:center;
  line-height:30px;
}
.theme-decor.top{top:8px;}
.theme-decor.bottom{bottom:8px;transform:rotate(180deg);}
.theme-decor::before{content:'✦ · ✦ · ✦';}

body[data-theme="gatinha"] .theme-decor::before{content:'♡ ୨୧ ♡ ୨୧ ♡';letter-spacing:7px;}
body[data-theme="halloween"] .theme-decor::before{content:'✦ ☾ ✦ ☽ ✦';letter-spacing:8px;}
body[data-theme="flores"] .theme-decor::before{content:'✿ ❀ ✿ ❀ ✿';letter-spacing:7px;}

body[data-theme="azulejo"] .card{
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.55), transparent 42%),
    radial-gradient(circle at 14px 14px, rgba(29,103,162,.16) 0 3px, transparent 3.5px),
    radial-gradient(circle at 0 0, transparent 0 12px, rgba(29,103,162,.07) 12.5px 13px, transparent 13.5px),
    repeating-linear-gradient(transparent, transparent 29px, rgba(29,103,162,.08) 30px);
  background-size:auto,28px 28px,28px 28px,auto;
}
body[data-theme="azulejo"] .theme-decor{
  height:28px;
  background:
    radial-gradient(circle at 14px 14px, rgba(29,103,162,.28) 0 3px, transparent 3.5px),
    linear-gradient(90deg, rgba(29,103,162,.15), transparent 22%, transparent 78%, rgba(29,103,162,.15));
  background-size:28px 28px, auto;
  border-block:1px solid rgba(29,103,162,.20);
}
body[data-theme="azulejo"] .theme-decor::before{content:'';}

.corner{
  position:absolute;
  width:22px;
  height:22px;
  border-color:var(--accent);
  border-style:solid;
  pointer-events:none;
  z-index:3;
}
.corner-tl{top:18px;left:18px;border-width:1.5px 0 0 1.5px;}
.corner-tr{top:18px;right:18px;border-width:1.5px 1.5px 0 0;}
.corner-bl{bottom:18px;left:18px;border-width:0 0 1.5px 1.5px;}
.corner-br{bottom:18px;right:18px;border-width:0 1.5px 1.5px 0;}

/* ── ESTADOS ─────────────────────────── */
.state{
  display:none;
  padding:clamp(48px,10vw,62px) clamp(26px,7vw,46px) clamp(38px,8vw,48px);
  position:relative;
  z-index:4;
}
.state.active{display:block;}
.state.animating{animation:fadeUp .28s cubic-bezier(.4,0,.2,1) both;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── IDLE ────────────────────────────── */
#state-idle{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:min(410px,calc(100svh - 40px));
  padding:72px 30px 58px;
}
#state-idle.active{display:flex;}

.idle-ornament{
  font-family:var(--font-card);
  font-size:clamp(28px,8vw,36px);
  color:var(--decor);
  margin-bottom:clamp(26px,8vw,38px);
  letter-spacing:clamp(8px,3vw,12px);
}
.idle-ornament::before{content:'cartinha';font-style:italic;letter-spacing:.04em;}

.plus-btn{
  width:62px;
  height:62px;
  min-width:62px;
  min-height:62px;
  border-radius:50%;
  border:1.5px solid var(--accent);
  background:var(--paper-ui-2);
  color:var(--accent);
  font-size:31px;
  font-weight:400;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .2s, color .2s, transform .15s, box-shadow .2s;
  font-family:var(--font-ui);
  line-height:1;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
}
.plus-btn:hover{background:var(--accent);color:var(--paper);transform:scale(1.04);}
.plus-btn:active{transform:scale(.97);}

.idle-label{
  margin-top:16px;
  font-size:10px;
  font-weight:600;
  letter-spacing:2.8px;
  text-transform:uppercase;
  color:var(--muted);
}

/* ── HEADER COMUM ────────────────────── */
.card-header{
  text-align:center;
  margin-bottom:clamp(28px,8vw,38px);
  padding-bottom:14px;
  border-bottom:1px solid var(--line);
  position:relative;
}
.card-title{
  font-family:var(--font-ui);
  font-size:10px;
  font-weight:700;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--muted);
}

/* ── FORM ────────────────────────────── */
.field{margin-bottom:21px;}
.field-label{
  display:block;
  font-size:9px;
  font-weight:700;
  letter-spacing:2.4px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}
.field-input,
.field-textarea{
  width:100%;
  max-width:100%;
  background:rgba(255,255,255,.16);
  border:none;
  border-bottom:1px solid var(--line);
  padding:8px 2px 10px;
  font-family:var(--font-card);
  font-size:20px;
  font-weight:600;
  color:var(--ink);
  outline:none;
  transition:border-color .2s, background .2s;
  caret-color:var(--accent);
  border-radius:0;
}
.field-input::placeholder,
.field-textarea::placeholder{
  color:var(--placeholder);
  font-style:italic;
  font-weight:500;
}
.field-input:focus,
.field-textarea:focus{
  border-bottom-color:var(--accent);
  background:rgba(255,255,255,.24);
}

.field-textarea{
  resize:vertical;
  min-height:122px;
  line-height:29px;
  font-style:italic;
  font-size:19px;
}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

.divider{
  height:1px;
  background:var(--line);
  margin:24px 0;
}

.save-btn{
  width:100%;
  min-height:46px;
  padding:13px;
  margin-top:8px;
  background:var(--accent);
  color:#fff8f0;
  border:none;
  border-radius:999px;
  font-family:var(--font-ui);
  font-size:10px;
  font-weight:700;
  letter-spacing:2.4px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .2s,transform .1s,box-shadow .2s;
  box-shadow:0 12px 28px var(--accent-shadow);
}
.save-btn:hover{opacity:.9;}
.save-btn:active{transform:scale(.99);}

/* ── PREVIEW ─────────────────────────── */
.preview-to-label{
  font-family:var(--font-ui);
  font-size:9px;
  font-weight:800;
  letter-spacing:2.8px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
}
.preview-to-name{
  font-family:var(--font-card);
  font-size:clamp(31px,8vw,36px);
  font-weight:700;
  color:var(--ink);
  margin-bottom:clamp(24px,7vw,32px);
  line-height:1.08;
  overflow-wrap:anywhere;
}
.preview-msg{
  font-family:var(--font-card);
  font-style:italic;
  font-weight:600;
  font-size:clamp(20px,5.6vw,23px);
  color:var(--ink-soft);
  line-height:1.5;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  min-height:32px;
  margin-bottom:clamp(30px,8vw,40px);
}
.preview-from{text-align:right;}
.preview-from-label{
  font-family:var(--font-ui);
  font-size:9px;
  font-weight:800;
  letter-spacing:2.8px;
  text-transform:uppercase;
  color:var(--muted);
}
.preview-from-name{
  font-family:var(--font-card);
  font-size:clamp(24px,6vw,27px);
  font-weight:700;
  color:var(--ink);
  margin-top:4px;
  overflow-wrap:anywhere;
}
.preview-date{
  font-family:var(--font-ui);
  font-size:10px;
  font-weight:600;
  color:var(--muted);
  margin-top:6px;
  letter-spacing:1px;
}

.reset-btn{
  display:block;
  margin:28px auto 0;
  background:var(--paper-ui-2);
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:999px;
  font-family:var(--font-ui);
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:10px 18px;
  min-height:40px;
  cursor:pointer;
  transition:color .2s,border-color .2s,background .2s;
}
.reset-btn:hover{color:var(--accent);border-color:var(--accent);}

/* ── AÇÕES / EXPORTAÇÃO ───────────────── */
.action-row{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1fr);
  gap:10px;
  margin-top:30px;
  align-items:stretch;
  width:100%;
}
.action-btn{
  width:100%;
  min-width:0;
  min-height:46px;
  height:46px;
  border:1px solid var(--line);
  background:var(--paper-ui-2);
  color:var(--muted);
  border-radius:999px;
  font-family:var(--font-ui);
  font-size:9px;
  font-weight:800;
  letter-spacing:1.35px;
  text-transform:uppercase;
  padding:0 10px;
  cursor:pointer;
  transition:color .2s,border-color .2s,background .2s,transform .1s;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1;
  white-space:nowrap;
}
.action-btn:hover{color:var(--accent);border-color:var(--accent);}
.action-btn:active{transform:scale(.99);}
.action-btn.solid{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff8f0;
  box-shadow:0 12px 28px var(--accent-shadow-soft);
}
.action-btn.solid:hover{opacity:.9;color:#fff8f0;}
.status{
  min-height:16px;
  margin-top:10px;
  text-align:center;
  font-size:10px;
  font-weight:600;
  letter-spacing:.5px;
  color:var(--muted);
}
.card.exporting [data-export-ignore="true"]{display:none!important;}
.card.exporting{
  width:420px!important;
  max-width:420px!important;
  border-radius:6px;
  box-shadow:none;
}
.card.exporting .state{animation:none!important;}


.card.exporting{
  width:420px!important;
  max-width:420px!important;
  min-width:420px!important;
  margin:0!important;
}
.card.exporting .state{
  padding:48px 26px 38px!important;
}
.card.exporting #state-idle{
  min-height:410px!important;
  padding:72px 30px 58px!important;
}
.card.exporting .row-2{
  display:grid!important;
  grid-template-columns:1fr 1fr!important;
  gap:20px!important;
}
.card.exporting .preview-top{
  display:flex!important;
  flex-direction:row!important;
  align-items:flex-start!important;
  justify-content:space-between!important;
  gap:18px!important;
}
.card.exporting .stamp-slot{
  width:108px!important;
  min-width:108px!important;
  flex:0 0 108px!important;
  align-self:auto!important;
  margin-top:0!important;
}
.card.exporting .preview-to-name{
  font-size:31px!important;
}
.card.exporting .preview-msg{
  font-size:20px!important;
}
.card.exporting .preview-from-name{
  font-size:24px!important;
}
@media(max-width:520px){
  body{
    place-items:start center;
    padding:12px;
    padding-top:max(12px,env(safe-area-inset-top));
    padding-bottom:max(12px,env(safe-area-inset-bottom));
  }
  .card{
    width:100%;
    max-width:420px;
    margin:auto 0;
  }
  .theme-picker{
    top:10px;
    right:10px;
    padding:5px 7px 5px 9px;
  }
  .theme-picker label{display:none;}
  .theme-picker select{max-width:118px;font-size:10.5px;}
  .state{
    padding:54px 24px 34px;
  }
  #state-idle{
    min-height:360px;
    padding:76px 24px 48px;
  }
  .row-2{
    grid-template-columns:1fr;
    gap:0;
  }
  .action-row{
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:8px;
  }
  .action-btn{
    min-height:44px;
    height:44px;
    font-size:8.5px;
    letter-spacing:1px;
    padding:0 8px;
  }
  .field-input,
  .field-textarea{
    font-size:18px;
  }
  .field-textarea{min-height:116px;}
}

@media(max-width:360px){
  body{padding:8px;}
  .state{padding:52px 20px 32px;}
  #state-idle{padding:76px 20px 46px;}
  .corner-tl{top:14px;left:14px;}
  .corner-tr{top:14px;right:14px;}
  .corner-bl{bottom:14px;left:14px;}
  .corner-br{bottom:14px;right:14px;}
  .card-title{letter-spacing:3px;}
  .save-btn{letter-spacing:1.6px;}
  .action-btn{font-size:8px;letter-spacing:.75px;padding:0 6px;}
}



.photo-input{
  width:100%;
  padding:10px 0 4px;
  font-size:13px;
  color:var(--ink-soft);
}
.photo-input::file-selector-button{
  border:1px solid var(--line);
  background:var(--paper-ui-2);
  color:var(--accent);
  border-radius:999px;
  padding:9px 14px;
  margin-right:12px;
  font:700 10px/1 var(--font-ui);
  letter-spacing:1.4px;
  text-transform:uppercase;
  cursor:pointer;
}

    radial-gradient(circle at calc(100% - 8px) 8px, transparent 0 3px, #fffaf3 3.2px 7px, transparent 7.2px) 100% 0/16px 16px,
    radial-gradient(circle at 8px calc(100% - 8px), transparent 0 3px, #fffaf3 3.2px 7px, transparent 7.2px) 0 100%/16px 16px,

</style>
</head>
<body data-theme="bordo">

<div class="card" id="card">
  <div class="theme-decor top" aria-hidden="true"></div>
  <div class="theme-decor bottom" aria-hidden="true"></div>

  <div class="theme-picker" data-export-ignore="true">
    <label for="theme-select">Tema</label>
    <select id="theme-select" onchange="setTheme(this.value)" aria-label="Escolher tema da cartinha">
      <option value="bordo">Bordô</option>
      <option value="gatinha">Gatinha</option>
      <option value="halloween">Halloween</option>
      <option value="flores">Flores</option>
      <option value="azulejo">Azulejos</option>
    </select>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- IDLE -->
  <div id="state-idle" class="state active">
    <div class="idle-ornament"></div>
    <button class="plus-btn" onclick="goEdit()" aria-label="Escrever nova carta">+</button>
    <span class="idle-label">nova carta</span>
  </div>

  <!-- FORM -->
  <div id="state-form" class="state">
    <div class="card-header">
      <span class="card-title">Recado</span>
    </div>

    <div class="field">
      <label class="field-label" for="f-para">Para</label>
      <input class="field-input" id="f-para" type="text" placeholder="nome do destinatário" autocomplete="off">
    </div>

    <div class="field">
      <label class="field-label" for="f-msg">Mensagem</label>
      <textarea class="field-textarea" id="f-msg" placeholder="escreva aqui..." rows="4"></textarea>
    </div>


    <div class="field">
      <label class="field-label" for="f-foto">Foto para selo</label>
      <input class="photo-input" id="f-foto" type="file" accept="image/*" onchange="handlePhotoUpload(event)">
      <label class="field-label" for="f-selo" style="margin-top:16px">Formato do selo</label>
      <select class="field-input" id="f-selo" onchange="setStampStyle(this.value)" aria-label="Escolher formato do selo">
        <option value="classico">Clássico postal</option>
        <option value="redondo">Redondo</option>
        <option value="polaroid">Polaroid</option>
        <option value="ticket">Ticket</option>

      </select>
      <div class="photo-help">O usuário pode importar uma foto e escolher o formato do selo na carta.</div>
      <div class="photo-thumb" id="photo-thumb" hidden>
        <img id="photo-thumb-img" alt="Prévia da foto selecionada">
        <button type="button" onclick="clearPhoto()">Remover foto</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="row-2">
      <div class="field">
        <label class="field-label" for="f-de">De</label>
        <input class="field-input" id="f-de" type="text" placeholder="seu nome" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label" for="f-data">Data</label>
        <input class="field-input" id="f-data" type="text" placeholder="dd/mm/aaaa" autocomplete="off">
      </div>

    <button class="save-btn" onclick="goPreview()">Selar carta →</button>
  </div>

  <!-- PREVIEW -->
  <div id="state-preview" class="state">
    <div class="card-header">
      <span class="card-title">Recado</span>
    </div>

    <div class="preview-top">
      <div class="preview-recipient">
        <div class="preview-to-label">para</div>
        <div class="preview-to-name" id="out-para"></div>
      </div>

      <div class="stamp-slot" id="stamp-slot" data-stamp="classico" aria-label="Selo com foto">
        <div class="stamp-frame">
          <div class="stamp-photo-wrap">
            <img id="out-photo" alt="Foto no selo postal">
          </div>
          <div class="stamp-badge" id="stamp-badge"></div>
        </div>
      </div>
    </div>

    <div class="preview-msg" id="out-msg"></div>

    <div class="preview-from">
      <div class="preview-from-label">de</div>
      <div class="preview-from-name" id="out-de"></div>
      <div class="preview-date" id="out-data"></div>
    </div>

    <div class="action-row" data-export-ignore="true">
      <button class="action-btn solid" onclick="shareWhatsapp()">WhatsApp</button>
      <button class="action-btn" onclick="downloadImage()">Gerar PNG</button>
    </div>
    <div class="status" id="status" data-export-ignore="true"></div>
    <button class="reset-btn" data-export-ignore="true" onclick="goIdle()">+ nova carta</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);


let cartaPhotoData = '';
let cartaStampStyle = 'classico';

const stampStyleNames = {
  classico:'',
  redondo:'selo redondo',
  polaroid:'foto postal',
  ticket:'ticket postal',
  coracao:'selo amor',
  vertical:'selo vertical'
};

function setStampStyle(style){
  cartaStampStyle = stampStyleNames[style] ? style : 'classico';
  const select = $('f-selo');
  if(select && select.value !== cartaStampStyle) select.value = cartaStampStyle;
  updateStampStyle();
}

function updateStampStyle(){
  const stampSlot = $('stamp-slot');
  const badge = $('stamp-badge');
  if(stampSlot) stampSlot.dataset.stamp = cartaStampStyle;
  if(badge) badge.textContent = stampStyleNames[cartaStampStyle] || ''; 
}

function updatePhotoPreview(){
  const thumb = $('photo-thumb');
  const thumbImg = $('photo-thumb-img');
  const stampSlot = $('stamp-slot');
  const outPhoto = $('out-photo');
  const hasPhoto = !!cartaPhotoData;

  updateStampStyle();

  if(thumb) thumb.hidden = !hasPhoto;
  if(stampSlot) stampSlot.classList.toggle('active', hasPhoto);

  if(hasPhoto){
    if(thumbImg) thumbImg.src = cartaPhotoData;
    if(outPhoto) outPhoto.src = cartaPhotoData;
  }else{
    if(thumbImg) thumbImg.removeAttribute('src');
    if(outPhoto) outPhoto.removeAttribute('src');
  }
}

function handlePhotoUpload(event){
  const file = event?.target?.files?.[0];
  if(!file) return;

  if(!file.type.startsWith('image/')){
    showStatus('Selecione um arquivo de imagem válido.');
    clearPhoto();
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    cartaPhotoData = reader.result || '';
    updatePhotoPreview();
    showStatus('Foto do selo adicionada.');
  };
  reader.onerror = () => showStatus('Não foi possível carregar a foto.');
  reader.readAsDataURL(file);
}

function clearPhoto(){
  cartaPhotoData = '';
  const input = $('f-foto');
  if(input) input.value = '';
  updatePhotoPreview();
}

async function waitForImagesIn(root){
  const images = Array.from(root.querySelectorAll('img'));
  await Promise.all(images.map(async img => {
    if(!img.getAttribute('src')) return;
    if(img.complete && img.naturalWidth > 0) return;
    try{
      if(img.decode) await img.decode();
      else await new Promise((resolve, reject) => {
        img.onload = () => resolve();
        img.onerror = () => reject(new Error('Erro ao carregar imagem.'));
      });
    }catch(_e){}
  }));
}

const themeNames = {
  bordo:'Bordô',
  gatinha:'Gatinha',
  halloween:'Halloween',
  flores:'Flores',
  azulejo:'Azulejos'
};

function setTheme(theme){
  const chosen = themeNames[theme] ? theme : 'bordo';
  document.body.dataset.theme = chosen;
  localStorage.setItem('cartinha-theme', chosen);
  const select = $('theme-select');
  if(select && select.value !== chosen) select.value = chosen;
}

function currentCarta(){
  return {
    para: $('out-para')?.textContent?.trim() || $('f-para')?.value?.trim() || '—',
    msg: $('out-msg')?.textContent?.trim() || $('f-msg')?.value?.trim() || '',
    de: $('out-de')?.textContent?.trim() || $('f-de')?.value?.trim() || '—',
    data: $('out-data')?.textContent?.trim() || $('f-data')?.value?.trim() || '',
    theme: themeNames[document.body.dataset.theme] || 'Bordô'
  };
}

function buildWhatsappText(){
  const c = currentCarta();
  return [
    `Cartinha para ${c.para}`,
    '',
    c.msg || '—',
    '',
    `De: ${c.de}`,
    c.data ? `Data: ${c.data}` : ''
  ].filter(Boolean).join('\n');
}

function safeFileName(value, fallback='cartinha'){
  return String(value || fallback)
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9_-]+/g,'-')
    .replace(/^-+|-+$/g,'')
    .toLowerCase()
    .slice(0,60) || fallback;
}

function showStatus(msg){
  const el = $('status');
  if(!el) return;
  el.textContent = msg || '';
  if(msg) setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; }, 4200);
}

function nextFrame(){
  return new Promise(resolve => requestAnimationFrame(resolve));
}


function getOrCreateExportStage(){
  let stage = document.getElementById('export-stage');
  if(stage) return stage;

  stage = document.createElement('div');
  stage.id = 'export-stage';
  stage.style.position = 'fixed';
  stage.style.left = '0';
  stage.style.top = '0';
  stage.style.zIndex = '-1';
  stage.style.pointerEvents = 'none';
  stage.style.overflow = 'hidden';
  stage.style.opacity = '1';
  stage.setAttribute('aria-hidden', 'true');
  document.body.appendChild(stage);
  return stage;
}

async function html2canvasReady(){
  for(let i=0;i<80;i++){
    if(window.html2canvas) return true;
    await new Promise(r=>setTimeout(r,100));
  }
  return false;
}

async function renderCartaBlob(){
  if(!$('state-preview').classList.contains('active')) goPreview();

  if(!await html2canvasReady()){
    throw new Error('A biblioteca de imagem ainda não carregou. Verifique a conexão e tente novamente.');
  }

  if(document.fonts?.ready) await document.fonts.ready;
  await waitForImagesIn(document);
  await nextFrame();
  await nextFrame();

  const card = $('card');
  const exportWidth = 420;
  const paperColor = getComputedStyle(card).backgroundColor || '#fff3e4';
  const scale = Math.min(3, Math.max(2, window.devicePixelRatio || 2));

  const stage = getOrCreateExportStage();
  stage.innerHTML = '';
  stage.style.width = exportWidth + 'px';
  stage.style.minWidth = exportWidth + 'px';
  stage.style.maxWidth = exportWidth + 'px';
  stage.style.height = 'auto';

  const clone = card.cloneNode(true);
  clone.id = 'export-card';
  clone.classList.add('exporting');
  clone.querySelectorAll('[data-export-ignore="true"]').forEach(el=>el.remove());
  clone.querySelectorAll('.state').forEach(s=>s.classList.remove('active','animating'));
  const previewClone = clone.querySelector('#state-preview');
  if(previewClone) previewClone.classList.add('active');
  clone.style.setProperty('width', exportWidth + 'px', 'important');
  clone.style.setProperty('max-width', exportWidth + 'px', 'important');
  clone.style.setProperty('min-width', exportWidth + 'px', 'important');
  clone.style.margin = '0';
  clone.style.transform = 'none';
  clone.style.boxSizing = 'border-box';
  clone.style.position = 'relative';
  clone.style.left = '0';
  clone.style.top = '0';
  stage.appendChild(clone);

  try{
    await waitForImagesIn(stage);
    await nextFrame();
    await nextFrame();

    const exportHeight = Math.ceil(clone.scrollHeight);
    const canvas = await html2canvas(clone, {
      backgroundColor: paperColor,
      scale,
      useCORS:true,
      allowTaint:false,
      logging:false,
      width:exportWidth,
      height:exportHeight,
      windowWidth:1200,
      windowHeight:Math.max(exportHeight, 900),
      scrollX:0,
      scrollY:0,
      x:0,
      y:0
    });

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    if(!blob) throw new Error('Não foi possível gerar a imagem.');

    const name = safeFileName(currentCarta().para, 'cartinha');
    return { blob, filename: `cartinha-${name}.png` };
  } finally {
    stage.innerHTML = '';
  }
}

async function downloadImage(){
  try{
    showStatus('Gerando imagem...');
    const { blob, filename } = await renderCartaBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    showStatus('Imagem gerada.');
  }catch(e){
    console.error(e);
    showStatus(e?.message || 'Erro ao gerar imagem.');
  }
}

async function shareWhatsapp(){
  const text = buildWhatsappText();

  try{
    showStatus('Preparando imagem...');
    const { blob, filename } = await renderCartaBlob();
    const file = new File([blob], filename, { type:'image/png' });

    if(navigator.canShare?.({ files:[file] }) && navigator.share){
      await navigator.share({
        title:'Cartinha',
        text,
        files:[file]
      });
      showStatus('Cartinha compartilhada.');
      return;
    }

    // Fallback: alguns navegadores não permitem anexar arquivo direto ao WhatsApp.
    // Nesses casos, baixamos o PNG, tentamos copiar o texto e abrimos o WhatsApp.
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);

    try{
      if(window.ClipboardItem && navigator.clipboard?.write){
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
      }
    }catch(_imgErr){}

    try{
      await navigator.clipboard?.writeText(text);
    }catch(_txtErr){}

    showStatus('Seu navegador não anexa PNG direto no WhatsApp. O arquivo foi baixado; anexe manualmente no WhatsApp.');

    const waUrl = 'https://wa.me/?text=' + encodeURIComponent(text);
    const opened = window.open(waUrl, '_blank', 'noopener,noreferrer');
    if(!opened) window.location.href = waUrl;
  }catch(e){
    console.error(e);
    showStatus(e?.message || 'Erro ao preparar compartilhamento.');
  }
}

function show(id){
  document.querySelectorAll('.state').forEach(s=>{
    s.classList.remove('active','animating');
  });
  const el = document.getElementById(id);
  el.classList.add('active','animating');
}

function goEdit(){
  show('state-form');
  setTimeout(()=>$('f-para').focus(), 80);
}

function goPreview(){
  const para = $('f-para').value.trim() || '—';
  const msg  = $('f-msg').value.trim();
  const de   = $('f-de').value.trim() || '—';
  const data = $('f-data').value.trim();

  $('out-para').textContent = para;
  $('out-msg').textContent  = msg;
  $('out-de').textContent   = de;
  $('out-data').textContent = data;
  setStampStyle($('f-selo')?.value || cartaStampStyle);
  updatePhotoPreview();

  show('state-preview');
}

function goIdle(){
  ['f-para','f-msg','f-de','f-data'].forEach(id=>{
    $(id).value='';
  });
  setStampStyle('classico');
  clearPhoto();
  show('state-idle');
}

setTheme(localStorage.getItem('cartinha-theme') || 'bordo');
setStampStyle('classico');
updatePhotoPreview();
</script>
</body>
</html>
