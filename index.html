<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cartinha</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f6eedc;
  --ink:#2c1a0a;
  --muted:rgba(90,60,30,0.38);
  --accent:#c4693a;
  --bg:#100b05;
}

html{
  min-height:100%;
  background:var(--bg);
}

body{
  min-height:100vh;
  min-height:100svh;
  background:var(--bg);
  display:grid;
  place-items:center;
  font-family:'IBM Plex Mono',monospace;
  overflow-x:hidden;
  overflow-y:auto;
  padding:clamp(12px,4vw,28px);
  -webkit-text-size-adjust:100%;
}

/* fundo texturizado */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(ellipse 60% 60% at 30% 40%, rgba(90,45,10,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 75% 70%, rgba(60,30,8,0.12) 0%, transparent 70%);
  pointer-events:none;
}

button,input,textarea{font:inherit;}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}

/* ── CARD ─────────────────────────────── */
.card{
  width:min(400px,100%);
  max-width:400px;
  background:var(--paper);
  border-radius:2px;
  position:relative;
  padding:0;
  overflow:hidden;
  box-shadow:
    0 2px 4px rgba(0,0,0,.25),
    0 8px 24px rgba(0,0,0,.35),
    0 24px 64px rgba(0,0,0,.3),
    inset 0 0 0 0.5px rgba(90,60,20,0.15);
  background-image:
    repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(100,70,30,0.07) 28px
    );
  z-index:1;
}

.card::after{
  content:'✦';
  position:absolute;
  bottom:20px;
  right:24px;
  font-size:10px;
  color:rgba(90,60,30,0.12);
  pointer-events:none;
}

.corner{
  position:absolute;
  width:18px;
  height:18px;
  border-color:var(--accent);
  border-style:solid;
  pointer-events:none;
  z-index:2;
}
.corner-tl{top:14px;left:14px;border-width:1px 0 0 1px;}
.corner-tr{top:14px;right:14px;border-width:1px 1px 0 0;}
.corner-bl{bottom:14px;left:14px;border-width:0 0 1px 1px;}
.corner-br{bottom:14px;right:14px;border-width:0 1px 1px 0;}

/* ── ESTADOS ─────────────────────────── */
.state{
  display:none;
  padding:clamp(34px,9vw,52px) clamp(24px,7vw,44px) clamp(32px,8vw,44px);
}
.state.active{display:block;}
.state.animating{animation:fadeUp .35s cubic-bezier(.4,0,.2,1) both;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── IDLE ────────────────────────────── */
#state-idle{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:min(380px,calc(100svh - 40px));
  padding:clamp(42px,10vw,52px) clamp(24px,7vw,44px);
}
#state-idle.active{display:flex;}

.idle-ornament{
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,7vw,30px);
  color:rgba(90,60,30,0.1);
  margin-bottom:clamp(28px,9vw,40px);
  letter-spacing:clamp(8px,3vw,12px);
}

.plus-btn{
  width:58px;
  height:58px;
  min-width:58px;
  min-height:58px;
  border-radius:50%;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  font-size:26px;
  font-weight:300;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .2s, color .2s, transform .15s;
  font-family:'IBM Plex Mono',monospace;
  line-height:1;
}
.plus-btn:hover{background:var(--accent);color:var(--paper);transform:scale(1.05);}
.plus-btn:active{transform:scale(.97);}

.idle-label{
  margin-top:14px;
  font-size:9px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(90,60,30,0.3);
}

/* ── HEADER COMUM ────────────────────── */
.card-header{
  text-align:center;
  margin-bottom:clamp(26px,8vw,36px);
  padding-bottom:14px;
  border-bottom:0.5px solid rgba(90,60,30,0.12);
  position:relative;
}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(90,60,30,0.35);
}

/* ── FORM ────────────────────────────── */
.field{margin-bottom:20px;}
.field-label{
  display:block;
  font-size:8.5px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(90,60,30,0.4);
  margin-bottom:7px;
}
.field-input,
.field-textarea{
  width:100%;
  max-width:100%;
  background:transparent;
  border:none;
  border-bottom:0.5px solid rgba(90,60,30,0.18);
  padding:7px 0 9px;
  font-family:'Playfair Display',serif;
  font-size:17px;
  color:var(--ink);
  outline:none;
  transition:border-color .2s;
  caret-color:var(--accent);
}
.field-input::placeholder,
.field-textarea::placeholder{
  color:rgba(90,60,30,0.22);
  font-style:italic;
}
.field-input:focus,
.field-textarea:focus{border-bottom-color:var(--accent);}

.field-textarea{
  resize:vertical;
  min-height:112px;
  line-height:28px;
  font-style:italic;
  font-size:16px;
}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

.divider{
  height:0.5px;
  background:rgba(90,60,30,0.1);
  margin:24px 0;
}

.save-btn{
  width:100%;
  min-height:44px;
  padding:13px;
  margin-top:6px;
  background:var(--accent);
  color:var(--paper);
  border:none;
  font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .2s,transform .1s;
}
.save-btn:hover{opacity:.88;}
.save-btn:active{transform:scale(.99);}

/* ── PREVIEW ─────────────────────────── */
.preview-to-label{
  font-size:8.5px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(90,60,30,0.35);
  margin-bottom:4px;
}
.preview-to-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,7vw,26px);
  color:var(--ink);
  margin-bottom:clamp(22px,7vw,30px);
  line-height:1.2;
  overflow-wrap:anywhere;
}
.preview-msg{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:16px;
  color:#3d2510;
  line-height:28px;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  min-height:28px;
  margin-bottom:clamp(28px,8vw,36px);
}
.preview-from{text-align:right;}
.preview-from-label{
  font-size:8.5px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(90,60,30,0.35);
}
.preview-from-name{
  font-family:'Playfair Display',serif;
  font-size:19px;
  color:var(--ink);
  margin-top:3px;
  overflow-wrap:anywhere;
}
.preview-date{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:rgba(90,60,30,0.3);
  margin-top:5px;
  letter-spacing:1px;
}

.reset-btn{
  display:block;
  margin:28px auto 0;
  background:transparent;
  border:0.5px solid rgba(90,60,30,0.18);
  color:rgba(90,60,30,0.38);
  font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:10px 18px;
  min-height:40px;
  cursor:pointer;
  transition:color .2s,border-color .2s;
}
.reset-btn:hover{color:var(--accent);border-color:var(--accent);}

/* ── AÇÕES / EXPORTAÇÃO ───────────────── */
.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:28px;
}
.action-btn{
  min-height:42px;
  border:0.5px solid rgba(90,60,30,0.18);
  background:transparent;
  color:rgba(90,60,30,0.46);
  font-family:'IBM Plex Mono',monospace;
  font-size:8.5px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  padding:10px;
  cursor:pointer;
  transition:color .2s,border-color .2s,background .2s,transform .1s;
}
.action-btn:hover{color:var(--accent);border-color:var(--accent);}
.action-btn:active{transform:scale(.99);}
.action-btn.solid{
  background:var(--accent);
  border-color:var(--accent);
  color:var(--paper);
}
.action-btn.solid:hover{opacity:.88;color:var(--paper);}
.status{
  min-height:16px;
  margin-top:10px;
  text-align:center;
  font-size:8.5px;
  letter-spacing:1px;
  color:rgba(90,60,30,0.42);
}
.card.exporting [data-export-ignore="true"]{display:none!important;}

@media(max-width:520px){
  body{
    place-items:start center;
    padding:12px;
    padding-top:max(12px,env(safe-area-inset-top));
    padding-bottom:max(12px,env(safe-area-inset-bottom));
  }
  .card{
    width:100%;
    max-width:400px;
    margin:auto 0;
  }
  .state{
    padding:38px 24px 32px;
  }
  #state-idle{
    min-height:340px;
    padding:46px 24px;
  }
  .row-2{
    grid-template-columns:1fr;
    gap:0;
  }
  .action-row{
    grid-template-columns:1fr;
  }
  .field-input,
  .field-textarea{
    font-size:16px;
  }
}

@media(max-width:360px){
  body{padding:8px;}
  .state{padding:34px 20px 28px;}
  #state-idle{padding:42px 20px;}
  .corner-tl{top:10px;left:10px;}
  .corner-tr{top:10px;right:10px;}
  .corner-bl{bottom:10px;left:10px;}
  .corner-br{bottom:10px;right:10px;}
  .card-title{letter-spacing:3px;}
  .save-btn,.action-btn{letter-spacing:1.8px;}
}

</style>
</head>
<body>

<div class="card" id="card">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- IDLE -->
  <div id="state-idle" class="state active">
    <div class="idle-ornament">· · ·</div>
    <button class="plus-btn" onclick="goEdit()" aria-label="Escrever nova carta">+</button>
    <span class="idle-label">nova carta</span>
  </div>

  <!-- FORM -->
  <div id="state-form" class="state">
    <div class="card-header">
      <span class="card-title">Recado</span>
    </div>

    <div class="field">
      <label class="field-label" for="f-para">Para</label>
      <input class="field-input" id="f-para" type="text" placeholder="nome do destinatário" autocomplete="off">
    </div>

    <div class="field">
      <label class="field-label" for="f-msg">Mensagem</label>
      <textarea class="field-textarea" id="f-msg" placeholder="escreva aqui..." rows="4"></textarea>
    </div>

    <div class="divider"></div>

    <div class="row-2">
      <div class="field">
        <label class="field-label" for="f-de">De</label>
        <input class="field-input" id="f-de" type="text" placeholder="seu nome" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label" for="f-data">Data</label>
        <input class="field-input" id="f-data" type="text" placeholder="dd/mm/aaaa" autocomplete="off">
      </div>
    </div>

    <button class="save-btn" onclick="goPreview()">Selar carta →</button>
  </div>

  <!-- PREVIEW -->
  <div id="state-preview" class="state">
    <div class="card-header">
      <span class="card-title">Recado</span>
    </div>

    <div class="preview-to-label">para</div>
    <div class="preview-to-name" id="out-para"></div>

    <div class="preview-msg" id="out-msg"></div>

    <div class="preview-from">
      <div class="preview-from-label">de</div>
      <div class="preview-from-name" id="out-de"></div>
      <div class="preview-date" id="out-data"></div>
    </div>

    <div class="action-row" data-export-ignore="true">
      <button class="action-btn solid" onclick="shareWhatsapp()">WhatsApp</button>
      <button class="action-btn" onclick="downloadJpeg()">Gerar JPEG</button>
    </div>
    <div class="status" id="status" data-export-ignore="true"></div>
    <button class="reset-btn" data-export-ignore="true" onclick="goIdle()">+ nova carta</button>
  </div>
</div>

<script>

const $ = id => document.getElementById(id);

function currentCarta(){
  return {
    para: $('out-para')?.textContent?.trim() || $('f-para')?.value?.trim() || '—',
    msg: $('out-msg')?.textContent?.trim() || $('f-msg')?.value?.trim() || '',
    de: $('out-de')?.textContent?.trim() || $('f-de')?.value?.trim() || '—',
    data: $('out-data')?.textContent?.trim() || $('f-data')?.value?.trim() || ''
  };
}

function buildWhatsappText(){
  const c = currentCarta();
  return [
    `Cartinha para ${c.para}`,
    '',
    c.msg || '—',
    '',
    `De: ${c.de}`,
    c.data ? `Data: ${c.data}` : ''
  ].filter(Boolean).join('\n');
}

function safeFileName(value, fallback='cartinha'){
  return String(value || fallback)
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9_-]+/g,'-')
    .replace(/^-+|-+$/g,'')
    .toLowerCase()
    .slice(0,60) || fallback;
}

function showStatus(msg){
  const el = $('status');
  if(!el) return;
  el.textContent = msg || '';
  if(msg) setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; }, 4200);
}

function nextFrame(){
  return new Promise(resolve => requestAnimationFrame(resolve));
}

async function html2canvasReady(){
  for(let i=0;i<80;i++){
    if(window.html2canvas) return true;
    await new Promise(r=>setTimeout(r,100));
  }
  return false;
}

async function renderCartaBlob(){
  if(!$('state-preview').classList.contains('active')) goPreview();

  if(!await html2canvasReady()){
    throw new Error('A biblioteca de imagem ainda não carregou. Verifique a conexão e tente novamente.');
  }

  if(document.fonts?.ready) await document.fonts.ready;
  await nextFrame();
  await nextFrame();

  const card = $('card');
  card.classList.add('exporting');

  try{
    const scale = Math.min(3, Math.max(2, window.devicePixelRatio || 2));
    const canvas = await html2canvas(card, {
      backgroundColor: null,
      scale,
      useCORS: true,
      allowTaint: true,
      logging: false,
      removeContainer: true
    });

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
    if(!blob) throw new Error('Não foi possível gerar a imagem.');

    const name = safeFileName(currentCarta().para, 'cartinha');
    return { blob, filename: `cartinha-${name}.jpg` };
  } finally {
    card.classList.remove('exporting');
  }
}

async function downloadJpeg(){
  try{
    showStatus('Gerando JPEG...');
    const { blob, filename } = await renderCartaBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    showStatus('JPEG gerado.');
  }catch(e){
    console.error(e);
    showStatus(e?.message || 'Erro ao gerar JPEG.');
  }
}

async function shareWhatsapp(){
  const text = buildWhatsappText();

  try{
    showStatus('Preparando...');
    const { blob, filename } = await renderCartaBlob();
    const file = new File([blob], filename, { type:'image/jpeg' });

    if(navigator.canShare?.({ files:[file] }) && navigator.share){
      await navigator.share({
        title:'Cartinha',
        text,
        files:[file]
      });
      showStatus('Cartinha compartilhada.');
      return;
    }
  }catch(e){
    console.warn('Compartilhamento de imagem indisponível, usando texto:', e);
  }

  try{
    await navigator.clipboard?.writeText(text);
    showStatus('Texto copiado. Abrindo WhatsApp...');
  }catch(_e){
    showStatus('Abrindo WhatsApp...');
  }

  const url = 'https://wa.me/?text=' + encodeURIComponent(text);
  const opened = window.open(url, '_blank', 'noopener,noreferrer');
  if(!opened) window.location.href = url;
}

function show(id){
  document.querySelectorAll('.state').forEach(s=>{
    s.classList.remove('active','animating');
  });
  const el = document.getElementById(id);
  el.classList.add('active','animating');
}

function goEdit(){
  show('state-form');
  setTimeout(()=>document.getElementById('f-para').focus(), 80);
}

function goPreview(){
  const para = document.getElementById('f-para').value.trim() || '—';
  const msg  = document.getElementById('f-msg').value.trim();
  const de   = document.getElementById('f-de').value.trim() || '—';
  const data = document.getElementById('f-data').value.trim();

  document.getElementById('out-para').textContent = para;
  document.getElementById('out-msg').textContent  = msg;
  document.getElementById('out-de').textContent   = de;
  document.getElementById('out-data').textContent = data;

  show('state-preview');
}

function goIdle(){
  ['f-para','f-msg','f-de','f-data'].forEach(id=>{
    document.getElementById(id).value='';
  });
  show('state-idle');
}
</script>
</body>
</html>
